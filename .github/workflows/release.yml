name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write  # necessário para SignPath (OIDC)

# Chaves de assinatura do updater (minisign). Geradas com `npx tauri signer generate`
# e guardadas em Settings → Secrets. Sem elas o build falha, pois
# bundle.createUpdaterArtifacts = true exige assinar os artefatos.
env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:

  # ── 1. Criar release draft ─────────────────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Criar release draft
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "UsoAI ${{ github.ref_name }}"
          draft: true
          body: |
            ## UsoAI ${{ github.ref_name }}

            Widget flutuante que mostra os limites de uso do Claude Code em tempo real.

            ### Download
            | Plataforma | Arquivo |
            |---|---|
            | **Windows** | `.exe` — installer assinado digitalmente |
            | **Linux** | `.deb` (Ubuntu/Debian), `.rpm` (Fedora) ou `.AppImage` |
            | **macOS** | `.dmg` — universal (Intel + Apple Silicon) |

            > Após a primeira instalação, novas versões se instalam sozinhas na
            > próxima abertura do app (auto-update). Usuários de `.deb`/`.rpm` no
            > Linux precisam atualizar manualmente.

            ### Configuração
            Após instalar, clique em ⚙ e insira seu token OAuth do Claude Code.

  # ── 2. Build Linux ─────────────────────────────────────────────────────────
  build-linux:
    needs: create-release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - run: npm ci

      - name: Alinhar versão com a tag
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          node -e "const f='src-tauri/tauri.conf.json';const j=require('./'+f);j.version=process.env.TAG.replace(/^v/,'');require('fs').writeFileSync(f,JSON.stringify(j,null,2)+'\n')"

      - run: npm run build

      - name: Upload .deb, .rpm e .AppImage para release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Guardar assinatura do updater (linux)
        uses: actions/upload-artifact@v4
        with:
          name: updater-linux
          path: src-tauri/target/release/bundle/appimage/*.AppImage.sig
          retention-days: 1

  # ── 3. Build macOS ─────────────────────────────────────────────────────────
  build-macos:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - run: npm ci

      - name: Alinhar versão com a tag
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          node -e "const f='src-tauri/tauri.conf.json';const j=require('./'+f);j.version=process.env.TAG.replace(/^v/,'');require('fs').writeFileSync(f,JSON.stringify(j,null,2)+'\n')"

      - run: npm run build -- --target universal-apple-darwin

      - name: Upload .dmg para release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

      - name: Upload artefato do updater (macOS) para release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz

      - name: Guardar assinatura do updater (macOS)
        uses: actions/upload-artifact@v4
        with:
          name: updater-macos
          path: src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
          retention-days: 1

  # ── 4. Build Windows + assinatura SignPath ─────────────────────────────────
  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - run: npm ci

      - name: Alinhar versão com a tag
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          node -e "const f='src-tauri/tauri.conf.json';const j=require('./'+f);j.version=process.env.TAG.replace(/^v/,'');require('fs').writeFileSync(f,JSON.stringify(j,null,2)+'\n')"

      - run: npm run build

      - name: Salvar instalador não-assinado como artefato temporário
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-unsigned
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 1

      - name: Assinar instalador com SignPath Foundation
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: usoai
          signing-policy-slug: release-signing
          artifact-configuration-slug: windows-installer
          github-artifact-id: windows-installer-unsigned
          wait-for-completion: true
          output-artifact-directory: signed/

      # IMPORTANTE: a assinatura minisign do updater precisa ser feita SOBRE o
      # .exe já assinado pela SignPath. A Authenticode altera os bytes do PE, o
      # que invalidaria uma assinatura gerada no build (sobre o .exe não-assinado).
      - name: Assinar instalador para o updater (minisign sobre o .exe assinado)
        shell: pwsh
        run: |
          $exe = Get-ChildItem signed/*.exe | Select-Object -First 1
          if (-not $exe) { throw "instalador assinado não encontrado em signed/" }
          npx tauri signer sign "$($exe.FullName)"

      - name: Upload .exe assinado para release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: signed/*.exe

      - name: Guardar assinatura do updater (windows)
        uses: actions/upload-artifact@v4
        with:
          name: updater-windows
          path: signed/*.exe.sig
          retention-days: 1

  # ── 5. Gerar manifesto do updater (latest.json) ────────────────────────────
  updater-manifest:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Baixar assinaturas de todas as plataformas
        uses: actions/download-artifact@v4
        with:
          path: parts
          pattern: updater-*
          merge-multiple: true

      - name: Gerar latest.json
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const TAG = process.env.TAG;
          const version = TAG.replace(/^v/, '');
          const base = `https://github.com/${process.env.REPO}/releases/download/${TAG}/`;
          const dir = 'parts';
          const sigs = fs.existsSync(dir) ? fs.readdirSync(dir).filter(f => f.endsWith('.sig')) : [];
          const platforms = {};
          for (const sig of sigs) {
            const asset = sig.replace(/\.sig$/, '');
            const signature = fs.readFileSync(path.join(dir, sig), 'utf8').trim();
            const entry = { signature, url: base + encodeURIComponent(asset) };
            if (asset.endsWith('.AppImage')) {
              platforms['linux-x86_64'] = entry;
            } else if (asset.endsWith('.app.tar.gz')) {
              platforms['darwin-x86_64'] = entry;
              platforms['darwin-aarch64'] = entry;
            } else if (asset.endsWith('.exe')) {
              platforms['windows-x86_64'] = entry;
            }
          }
          if (Object.keys(platforms).length === 0) {
            throw new Error('nenhuma assinatura .sig encontrada — latest.json vazio');
          }
          const manifest = {
            version,
            notes: `UsoAI ${version}`,
            pub_date: new Date().toISOString(),
            platforms,
          };
          fs.writeFileSync('latest.json', JSON.stringify(manifest, null, 2));
          console.log(JSON.stringify(manifest, null, 2));
          NODE

      - name: Upload latest.json para release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: latest.json

  # ── 6. Publicar release ────────────────────────────────────────────────────
  publish-release:
    needs: [updater-manifest]
    runs-on: ubuntu-latest
    steps:
      - name: Publicar release (remover draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
