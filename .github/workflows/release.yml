name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: ubuntu-22.04
            args: ""
          - platform: macos-latest
            args: "--target universal-apple-darwin"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependências do sistema (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar Rust estável
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Instalar dependências npm
        run: npm ci

      - name: Build e publicar release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "UsoAI ${{ github.ref_name }}"
          releaseBody: |
            ## UsoAI ${{ github.ref_name }}

            Widget flutuante que mostra os limites de uso do Claude Code.

            ### Instalação
            - **Windows**: baixe o `.exe` (NSIS installer)
            - **Linux**: baixe o `.deb` (Debian/Ubuntu) ou `.rpm` (Fedora)
            - **macOS**: baixe o `.dmg` (universal — Intel + Apple Silicon)

            ### Configuração
            Após instalar, clique em ⚙ para inserir seu token OAuth do Claude Code.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
